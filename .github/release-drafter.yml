name-template: 'WindexBar $RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Features'
    labels:
      - feature
      - enhancement
  - title: 'Fixes'
    labels:
      - bug
      - fix
  - title: 'Maintenance'
    labels:
      - maintenance
      - chore
      - dependencies
  - title: 'Documentation'
    labels:
      - documentation

exclude-labels:
  - skip-changelog

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - maintenance
      - chore
      - dependencies
      - documentation
  default: patch

template: |
  ## What's Changed

  $CHANGES
